<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#031429" />
    <title>Ultimate Manager</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="opening-screen">
      <h1 class="visually-hidden">Ultimate Manager</h1>

      <section class="menu-panel" aria-label="Main menu">
        <nav class="menu" aria-label="Game options">
          <button class="menu-button" type="button">Start New Game</button>
          <button class="menu-button" type="button">Load Game</button>
          <button class="menu-button" type="button" data-action="settings">
            Settings
          </button>
          <button class="menu-button" type="button" data-action="quit">
            Quit Game
          </button>
        </nav>
      </section>

      <img
        class="brand-logo"
        src="/src/assets/ultimate-manager-logo.png"
        alt="Ultimate Manager"
      />

      <section class="settings-overlay" data-settings aria-hidden="true" hidden>
        <form
          class="settings-dialog"
          data-settings-form
          role="dialog"
          aria-modal="true"
          aria-labelledby="settings-title"
        >
          <header class="settings-header">
            <h2 id="settings-title">Settings</h2>
            <button
              class="settings-close"
              type="button"
              data-action="close-settings"
              aria-label="Close settings"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6 18 18M18 6 6 18" />
              </svg>
            </button>
          </header>

          <div class="settings-content">
            <section class="settings-section" aria-labelledby="display-title">
              <div class="settings-section-heading">
                <h3 id="display-title">Display</h3>
                <p>Choose how Ultimate Manager appears on your monitor.</p>
              </div>

              <fieldset class="settings-fieldset">
                <legend>Display Mode</legend>
                <div class="display-mode-options">
                  <label class="display-mode-option">
                    <input
                      type="radio"
                      name="display-mode"
                      value="windowed"
                      checked
                    />
                    <span class="display-mode-name">Windowed</span>
                    <span class="display-mode-description"
                      >Resizable window</span
                    >
                  </label>

                  <label class="display-mode-option">
                    <input
                      type="radio"
                      name="display-mode"
                      value="borderless"
                    />
                    <span class="display-mode-name">Fullscreen Windowed</span>
                    <span class="display-mode-description"
                      >Borderless display</span
                    >
                  </label>

                  <label class="display-mode-option">
                    <input
                      type="radio"
                      name="display-mode"
                      value="fullscreen"
                    />
                    <span class="display-mode-name">Fullscreen</span>
                    <span class="display-mode-description"
                      >Native fullscreen</span
                    >
                  </label>
                </div>
              </fieldset>

              <label class="settings-field" for="resolution">
                <span>
                  <span class="settings-field-label">Resolution</span>
                  <span class="settings-field-description">
                    Used for Windowed mode
                  </span>
                </span>
                <span class="select-shell">
                  <select id="resolution" name="resolution">
                    <option value="1280x720">1280 × 720</option>
                    <option value="1600x900">1600 × 900</option>
                    <option value="1920x1080">1920 × 1080</option>
                    <option value="2560x1440">2560 × 1440</option>
                    <option value="3840x2160">3840 × 2160</option>
                  </select>
                  <svg viewBox="0 0 20 20" aria-hidden="true">
                    <path d="m5 7.5 5 5 5-5" />
                  </svg>
                </span>
              </label>
            </section>
          </div>

          <footer class="settings-footer">
            <p
              class="settings-status"
              data-settings-status
              aria-live="polite"
            ></p>
            <div class="settings-actions">
              <button
                class="settings-button settings-button-secondary"
                type="button"
                data-action="close-settings"
              >
                Back
              </button>
              <button
                class="settings-button settings-button-primary"
                type="submit"
              >
                Apply Changes
              </button>
            </div>
          </footer>
        </form>
      </section>

      <aside
        class="update-toast"
        data-update-toast
        aria-labelledby="update-toast-title"
        aria-hidden="true"
        hidden
      >
        <div class="update-toast-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 3v11m0 0 4-4m-4 4-4-4M5 20h14" />
          </svg>
        </div>

        <div class="update-toast-content">
          <p
            class="update-toast-title"
            id="update-toast-title"
            data-update-title
          >
            Update available
          </p>
          <p class="update-toast-message" data-update-message></p>

          <div class="update-progress" data-update-progress hidden>
            <div
              class="update-progress-track"
              data-update-progress-bar
              role="progressbar"
              aria-label="Update download progress"
              aria-valuemin="0"
              aria-valuemax="100"
            >
              <span
                class="update-progress-value"
                data-update-progress-value
              ></span>
            </div>
            <span class="update-progress-label" data-update-progress-label>
              Preparing download…
            </span>
          </div>

          <button
            class="update-toast-action"
            type="button"
            data-action="install-update"
          >
            Update now
          </button>
        </div>

        <button
          class="update-toast-close"
          type="button"
          data-action="dismiss-update"
          aria-label="Dismiss update"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6 18 18M18 6 6 18" />
          </svg>
        </button>
      </aside>

      <p class="version" aria-label="Application version"></p>
    </main>
  </body>
</html>
